specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: GemFun
    network: base
    source:
      address: "0x25064346f8E910Ea710d93e15a0E24d0233e60F2"
      abi: GemFun
      startBlock: 43302000
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Token
        - Trade
      abis:
        - name: GemFun
          file: ./abis/GemFun.json
      eventHandlers:
        - event: TokenCreated(indexed address,indexed address)
          handler: handleTokenCreated
        - event: Trade(indexed address,indexed address,bool,uint256,uint256)
          handler: handleTrade
        - event: Migrated(indexed address,uint256)
          handler: handleMigrated
        - event: TokenRemoved(indexed address)
          handler: handleTokenRemoved
      file: ./src/mapping.ts
